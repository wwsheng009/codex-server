name: Embedded Frontend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/embedded-frontend.yml"
      - "scripts/build-embedded-backend.ps1"
      - "scripts/build-embedded-backend.sh"
      - "backend/go.mod"
      - "backend/go.sum"
      - "backend/cmd/server/**"
      - "backend/internal/api/router.go"
      - "backend/internal/api/router*_test.go"
      - "backend/internal/servercmd/run.go"
      - "backend/internal/servercmd/run_test.go"
      - "backend/internal/webui/**"
      - "frontend/index.html"
      - "frontend/i18n-check.config.mjs"
      - "frontend/lingui.config.ts"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/pnpm-lock.yaml"
      - "frontend/tsconfig.json"
      - "frontend/tsconfig.app.json"
      - "frontend/tsconfig.node.json"
      - "frontend/vite.config.ts"
      - "frontend/public/**"
      - "frontend/scripts/**"
      - "frontend/src/**"
      - "frontend/styles/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/embedded-frontend.yml"
      - "scripts/build-embedded-backend.ps1"
      - "scripts/build-embedded-backend.sh"
      - "backend/go.mod"
      - "backend/go.sum"
      - "backend/cmd/server/**"
      - "backend/internal/api/router.go"
      - "backend/internal/api/router*_test.go"
      - "backend/internal/servercmd/run.go"
      - "backend/internal/servercmd/run_test.go"
      - "backend/internal/webui/**"
      - "frontend/index.html"
      - "frontend/i18n-check.config.mjs"
      - "frontend/lingui.config.ts"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/pnpm-lock.yaml"
      - "frontend/tsconfig.json"
      - "frontend/tsconfig.app.json"
      - "frontend/tsconfig.node.json"
      - "frontend/vite.config.ts"
      - "frontend/public/**"
      - "frontend/scripts/**"
      - "frontend/src/**"
      - "frontend/styles/**"

jobs:
  windows-embedded-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run focused frontend validation
        run: |
          npm run test -- src/lib/api-client.test.ts src/hooks/useWorkspaceStream.test.ts
          npm run i18n:check
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy embedded frontend dist
        run: |
          Remove-Item -Recurse -Force backend\internal\webui\dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path backend\internal\webui\dist | Out-Null
          Copy-Item -Recurse -Force frontend\dist\* backend\internal\webui\dist\

      - name: Run focused backend validation
        run: |
          go test ./internal/servercmd ./internal/webui
          go test ./internal/api -run 'TestConfigAndSearchRoutesValidateRequestBody' -count=1
          go test -tags embed_frontend ./internal/servercmd ./internal/webui
          go test -tags embed_frontend ./internal/api -run 'Test(ConfigAndSearchRoutesValidateRequestBody|EmbeddedRouter.*)' -count=1
        working-directory: backend

      - name: Build embedded backend
        run: pwsh -File .\scripts\build-embedded-backend.ps1 -OutputPath .\backend\bin\codex-server-embedded.exe

  linux-embedded-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Validate shell script syntax
        run: bash -n ./scripts/build-embedded-backend.sh

      - name: Build embedded backend via shell script
        env:
          OUTPUT_PATH: ./backend/bin/codex-server-embedded
        run: |
          chmod +x ./scripts/build-embedded-backend.sh
          ./scripts/build-embedded-backend.sh
